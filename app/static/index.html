<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM BOT Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #020617;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --bot-bubble: rgba(30, 41, 59, 0.6);
            --user-bubble: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .aurora-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            z-index: -1;
            background: var(--bg-base);
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out alternate;
        }
        .orb-1 { width: 50vw; height: 50vw; background: #1e1b4b; top: -10%; left: -10%; animation-delay: 0s; }
        .orb-2 { width: 40vw; height: 40vw; background: #0f3c4c; bottom: -10%; right: -10%; animation-delay: -5s; }
        .orb-3 { width: 45vw; height: 45vw; background: #2e1065; top: 30%; left: 30%; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.1); }
            100% { transform: translate(-5%, -10%) scale(0.9); }
        }

        .chat-container {
            width: 90%;
            max-width: 1000px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            animation: containerEntry 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes containerEntry {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .chat-header {
            padding: 24px 30px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(15, 23, 42, 0.2);
        }
        
        .header-avatar {
            width: 48px;
            height: 48px;
            border-radius: 16px;
            background: var(--user-bubble);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .header-title {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .header-status {
            font-size: 0.85rem;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 2px;
        }
        .status-dot {
            width: 8px; height: 8px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 10px #4ade80;
        }

        .chatbox {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        .chatbox::-webkit-scrollbar { width: 6px; }
        .chatbox::-webkit-scrollbar-track { background: transparent; }
        .chatbox::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .chatbox::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        .message {
            max-width: 80%;
            display: flex;
            flex-direction: column;
            flex-shrink: 0; /* Prevents squishing when chat is full */
            animation: messagePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes messagePop {
            from { opacity: 0; transform: translateY(20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message-text {
            padding: 16px 20px;
            font-size: 1.05rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            align-items: flex-end;
        }

        .user-message .message-text {
            background: var(--user-bubble);
            border-radius: 20px 20px 4px 20px;
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
            font-weight: 400;
        }

        .bot-message {
            align-self: flex-start;
            align-items: flex-start;
        }

        .bot-message .message-text {
            background: var(--bot-bubble);
            border: 1px solid var(--glass-border);
            border-radius: 20px 20px 20px 4px;
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.3);
        }

        .typing-indicator {
            display: none;
            padding: 16px 20px;
            background: var(--bot-bubble);
            border: 1px solid var(--glass-border);
            border-radius: 20px 20px 20px 4px;
            align-self: flex-start;
            flex-shrink: 0;
            animation: messagePop 0.3s ease-out;
        }
        .typing-dots {
            display: flex;
            gap: 6px;
        }
        .typing-dot {
            width: 8px; height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .product-carousel {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            overflow-x: auto;
            padding: 10px 5px 20px 5px;
            flex-shrink: 0;
            scroll-snap-type: x mandatory;
        }
        
        .product-carousel::-webkit-scrollbar { height: 6px; }
        .product-carousel::-webkit-scrollbar-track { background: transparent; }
        .product-carousel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .product-card {
            min-width: 260px;
            width: 260px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            scroll-snap-align: start;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .product-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(255,255,255,0.3);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.7), 0 0 20px var(--primary-glow);
        }

        .product-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            background: #cbd5e1;
        }

        .product-title {
            font-weight: 800;
            font-size: 1.1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-price {
            color: #4ade80;
            font-weight: 800;
            font-size: 1.2rem;
        }

        .product-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.4;
            flex-grow: 1;
        }

        .buy-btn {
            width: 100%;
            padding: 12px;
            background: var(--text-light);
            color: var(--bg-base);
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Outfit', sans-serif;
        }

        .buy-btn:hover {
            background: var(--primary);
            color: #fff;
            transform: scale(1.03);
        }

        .input-dock {
            padding: 20px 30px;
            background: rgba(15, 23, 42, 0.3);
            border-top: 1px solid var(--glass-border);
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--glass-border);
            padding: 8px 8px 8px 20px;
            border-radius: 40px;
            transition: all 0.3s;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        .input-wrapper:focus-within {
            background: rgba(30, 41, 59, 0.9);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-light);
            font-size: 1.1rem;
            outline: none;
            font-family: 'Outfit', sans-serif;
        }
        
        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .send-btn:hover {
            transform: scale(1.1) rotate(-10deg);
            box-shadow: 0 0 15px var(--primary-glow);
        }
        
        .send-btn svg {
            width: 20px; height: 20px;
            fill: none; stroke: currentColor; stroke-width: 2;
            stroke-linecap: round; stroke-linejoin: round;
        }

    </style>
</head>
<body>

    <div class="aurora-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="header-avatar">✨</div>
            <div>
                <div class="header-title">SAM BOT</div>
                <div class="header-status"><div class="status-dot"></div> Online</div>
            </div>
        </div>

        <div class="chatbox" id="chatbox">
            <div class="message bot-message">
                <div class="message-text">Hello! Welcome to our premium E-Commerce store. Are you looking for a new phone, laptop, watch, tablet, or audio device today?</div>
            </div>
            
            <div class="typing-indicator" id="typing-indicator">
                <div class="typing-dots">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>
        </div>

        <div class="input-dock">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Ask me anything... (e.g. 'iPhone 17', 'laptops')" onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatbox = document.getElementById('chatbox');
        const input = document.getElementById('user-input');
        const typingIndicator = document.getElementById('typing-indicator');

        function showTyping() {
            chatbox.appendChild(typingIndicator);
            typingIndicator.style.display = 'flex';
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function hideTyping() {
            typingIndicator.style.display = 'none';
        }

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';
            
            showTyping();

            try {
                const response = await fetch('/chat/' + encodeURIComponent(message));
                const data = await response.json();
                
                setTimeout(() => {
                    hideTyping();
                    addBotResponse(data);
                }, 600);
            } catch (error) {
                hideTyping();
                addMessage("Oops! I lost connection to the server. Please try again.", 'bot');
            }
        }

        function addMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}-message`;
            
            let formattedText = text;
            if(sender === 'bot') {
                formattedText = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            }

            msgDiv.innerHTML = `<div class="message-text">${formattedText}</div>`;
            chatbox.insertBefore(msgDiv, typingIndicator);
            chatbox.scrollTop = chatbox.scrollHeight;
        }

        function addBotResponse(data) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message bot-message';
            
            let htmlContent = `<div class="message-text">${data.text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</div>`;
            msgDiv.innerHTML = htmlContent;
            chatbox.insertBefore(msgDiv, typingIndicator);

            if (data.products && data.products.length > 0) {
                const carousel = document.createElement('div');
                carousel.className = 'product-carousel';
                
                data.products.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'product-card';
                    card.innerHTML = `
                        <img src="${p.image_url}" alt="${p.name}">
                        <div class="product-title" title="${p.name}">${p.name}</div>
                        <div class="product-price">${p.price}</div>
                        <div class="product-desc">${p.description}</div>
                        <button class="buy-btn" onclick="initiateBuy('${p.name.replace(/'/g, "\\'")}', '${p.price}', '${p.image_url}')">Buy Now</button>
                    `;
                    carousel.appendChild(card);
                });

                chatbox.insertBefore(carousel, typingIndicator);
            }

            chatbox.scrollTop = chatbox.scrollHeight;
        }

        window.initiateBuy = function(name, price, image) {
            const url = `/checkout?name=${encodeURIComponent(name)}&price=${encodeURIComponent(price)}&image=${encodeURIComponent(image)}`;
            window.location.href = url;
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
