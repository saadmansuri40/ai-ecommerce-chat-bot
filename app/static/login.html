<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM BOT Store - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #020617;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .corner-bg-container {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -2;
            background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            overflow: hidden;
        }

        .corner-img {
            position: absolute;
            width: 180px;
            height: 180px;
            background-size: 85%;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #ffffff;
            border-radius: 28px;
            border: 5px solid #ffffff;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 25px rgba(255, 255, 255, 0.15), inset 0 0 15px rgba(0,0,0,0.05);
            opacity: 0.85;
            animation: floatAnim 8s ease-in-out infinite alternate;
            transform-origin: center;
        }

        .corner-img.top-left { top: 40px; left: 40px; animation-delay: 0s; }
        .corner-img.top-right { top: 40px; right: 40px; animation-delay: 1.5s; }
        .corner-img.bottom-left { bottom: 40px; left: 40px; animation-delay: 3s; }
        .corner-img.bottom-right { bottom: 40px; right: 40px; animation-delay: 4.5s; }
        .corner-img.center { 
            top: 50%; left: 50%; 
            width: 280px; height: 280px;
            border-radius: 40px;
            opacity: 0.4; 
            animation: centerFloat 10s ease-in-out infinite alternate; 
            z-index: -1;
        }

        @keyframes floatAnim {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(20px) rotate(6deg); }
        }

        @keyframes centerFloat {
            0% { transform: translate(-50%, -50%) scale(1) rotate(-3deg); }
            100% { transform: translate(-50%, -45%) scale(1.05) rotate(3deg); }
        }

        .login-container {
            width: 90%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px 50px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            animation: containerEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        @keyframes containerEntry {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-header {
            text-align: center;
        }

        .login-header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-light);
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-light);
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: all 0.3s;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        .form-group input:focus {
            background: rgba(30, 41, 59, 0.9);
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .forgot-pwd {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.3s;
        }

        .forgot-pwd:hover {
            color: #60a5fa;
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4);
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(59, 130, 246, 0.6);
            background: #2563eb;
        }

        .login-btn:active {
            transform: translateY(1px);
        }

        .error-message {
            color: var(--danger);
            font-size: 0.9rem;
            text-align: center;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 10px 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--glass-border);
        }
        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }

        .social-login {
            display: flex;
            gap: 15px;
        }
        
        .social-btn {
            flex: 1;
            padding: 12px;
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-light);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Outfit', sans-serif;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link a:hover {
            color: var(--text-light);
        }
    </style>
</head>
<body>

    <div class="corner-bg-container">
        <div class="corner-img top-left" style="background-image: url('/static/images/11.webp');"></div>
        <div class="corner-img top-right" style="background-image: url('/static/images/22.webp');"></div>
        <div class="corner-img bottom-left" style="background-image: url('/static/images/33.webp');"></div>
        <div class="corner-img bottom-right" style="background-image: url('/static/images/44.webp');"></div>
        <div class="corner-img center" style="background-image: url('/static/images/55.webp');"></div>
    </div>

    <div class="login-container">
        <div class="login-header">
            <h1>Welcome Back</h1>
            <p>Log in to access your SAM BOT Store account</p>
        </div>

        <div class="error-message" id="error-msg">Invalid email or password. Please try again.</div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <div class="form-options">
            <label class="remember-me">
                <input type="checkbox"> Remember me
            </label>
            <a href="#" class="forgot-pwd">Forgot password?</a>
        </div>

        <button class="login-btn" onclick="attemptLogin()">Sign In</button>

        <div class="divider">or continue with</div>

        <div class="social-login">
            <button class="social-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </button>
            <button class="social-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
                </svg>
                GitHub
            </button>
        </div>

        <div class="back-link">
            <a href="/">← Back to Store</a>
        </div>
    </div>

    <script>
        function attemptLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = document.querySelector('.login-btn');

            if (!email || !password) {
                errorMsg.textContent = "Please fill in all fields.";
                errorMsg.style.display = "block";
                return;
            }

            // Show loading state
            const originalText = btn.textContent;
            btn.textContent = "Authenticating...";
            btn.style.opacity = "0.7";
            errorMsg.style.display = "none";

            // Simulate server authentication delay (Honeypot behavior: log and reject)
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.opacity = "1";
                errorMsg.textContent = "Invalid email or password. Please try again.";
                errorMsg.style.display = "block";
                
                // Optional: In a real honeypot, the credentials would be sent to the server here.
                // fetch('/api/login_attempt', { method: 'POST', body: JSON.stringify({email, password}) });
                
                document.getElementById('password').value = '';
            }, 1500);
        }

        // Add Enter key listener
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                attemptLogin();
            }
        });
    </script>
</body>
</html>
